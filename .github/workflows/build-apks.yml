name: Build App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project (always fresh, to avoid stale leftovers)
        run: |
          if [ ! -f WebToApkGen.zip ]; then
            echo "::error::WebToApkGen.zip not found at repo root."
            echo "Files currently in repo root:"
            ls -la
            exit 1
          fi
          rm -rf WebToApkGen
          unzip -q WebToApkGen.zip
          echo "Extracted contents:"
          find WebToApkGen -maxdepth 2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Show active config (sanity check)
        working-directory: WebToApkGen
        run: cat template/config.properties

      - name: Build the app (release, signed)
        working-directory: WebToApkGen
        run: gradle :template:assembleRelease

      - name: Upload the installable APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: WebToApkGen/template/build/outputs/apk/release/*.apk
