name: Build APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ ! -f WebToApkGen.zip ]; then
            echo "::error::WebToApkGen.zip not found at repo root. Upload it first, then re-run this workflow."
            exit 1
          fi
          unzip -q WebToApkGen.zip
          ls -la WebToApkGen

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build :template (release, unsigned)
        working-directory: WebToApkGen
        run: gradle :template:assembleRelease

      - name: Upload template.apk
        uses: actions/upload-artifact@v4
        with:
          name: template-apk
          path: WebToApkGen/template/build/outputs/apk/release/*.apk

      - name: Build :app (debug)
        working-directory: WebToApkGen
        run: gradle :app:assembleDebug
        continue-on-error: true

      - name: Upload generator app APK (if built)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: generator-app-debug-apk
          path: WebToApkGen/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
