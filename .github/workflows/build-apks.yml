name: Build App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project (only if the project was uploaded as a zip)
        run: |
          if [ -f WebToApkGen.zip ] && [ ! -d WebToApkGen ]; then
            unzip -q WebToApkGen.zip
          fi
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Show active config (sanity check)
        working-directory: WebToApkGen
        run: cat template/config.properties

      - name: Build the app (release, signed)
        working-directory: WebToApkGen
        run: gradle :template:assembleRelease

      - name: Upload the installable APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: WebToApkGen/template/build/outputs/apk/release/*.apk
